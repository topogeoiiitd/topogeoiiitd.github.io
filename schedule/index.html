<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Topology and Geometry Seminar - IIIT Delhi</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/logo.png">
    <link rel="apple-touch-icon" href="/assets/logo.png">
    <link rel="shortcut icon" href="/assets/logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-full flex flex-col">
    <div id="navbar-container"></div>

    <header class="bg-gradient-to-r from-blue-900 to-blue-700 text-white py-16 pt-32">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Seminar Schedule</h1>
            <p class="text-xl mb-8">View all upcoming talks and add them to your calendar</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        <section class="mb-12">
            <h2 class="text-3xl font-bold mb-6 text-blue-800 border-b-2 border-blue-200 pb-2">Upcoming Talks</h2>
            <div id="schedule-talks" class="space-y-4">
                <div class="text-center py-8">
                    <i class="fas fa-spinner fa-spin text-blue-500 text-2xl mb-2"></i>
                    <p class="text-gray-600">Loading talks...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container" class="mt-auto"></div>

    <script>
        // ─── Timezone Helpers ─────────────────────────────────────────────────────
        function parseISTDateTime(dateStr, timeStr) {
            const cleanTime = timeStr.replace(/\s*IST\s*/i, '').trim();
            return new Date(`${dateStr}T${cleanTime}:00+05:30`);
        }

        function formatTalkTime(dateStr, timeStr) {
            try {
                const dt = parseISTDateTime(dateStr, timeStr);
                if (isNaN(dt.getTime())) return timeStr;

                const istFormatted = dt.toLocaleTimeString('en-US', {
                    timeZone: 'Asia/Kolkata',
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZoneName: 'short'
                });

                const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
                if (userTZ === 'Asia/Kolkata') return istFormatted;

                const localFormatted = dt.toLocaleTimeString('en-US', {
                    timeZone: userTZ,
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZoneName: 'short'
                });

                return `${istFormatted} <span class="text-gray-400 text-sm font-normal">(${localFormatted} local)</span>`;
            } catch (e) {
                return timeStr;
            }
        }

        function formatTalkDate(dateStr, timeStr) {
            try {
                const dt = parseISTDateTime(dateStr, timeStr);
                return dt.toLocaleDateString('en-US', {
                    timeZone: 'Asia/Kolkata',
                    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
                });
            } catch (e) {
                return dateStr;
            }
        }
        // ─────────────────────────────────────────────────────────────────────────

        async function loadNavbar() {
            try {
                const response = await fetch('/components/navbar.html');
                document.getElementById('navbar-container').innerHTML = await response.text();
                initializeNavbar();
            } catch (error) {
                document.getElementById('navbar-container').innerHTML = `
                    <nav class="bg-blue-800 text-white shadow-lg fixed top-0 left-0 right-0 z-50">
                        <div class="container mx-auto px-4 py-3">
                            <h1 class="text-xl font-bold">Topology & Geometry Seminar</h1>
                        </div>
                    </nav>`;
            }
        }

        function initializeNavbar() {
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileNav = document.getElementById('mobile-nav');
            if (mobileMenuBtn && mobileNav) {
                mobileMenuBtn.addEventListener('click', () => {
                    const isExpanded = mobileNav.classList.toggle('hidden');
                    mobileMenuBtn.setAttribute('aria-expanded', !isExpanded);
                });
            }
        }

        async function loadFooter() {
            try {
                const response = await fetch('/components/footer.html');
                document.getElementById('footer-container').innerHTML = await response.text();
            } catch (error) {
                document.getElementById('footer-container').innerHTML = `
                    <footer class="bg-blue-900 text-white py-8 mt-auto">
                        <div class="container mx-auto px-4 text-center text-sm text-blue-200">
                            <p>© 2025 Topology and Geometry Seminar, IIIT Delhi.</p>
                        </div>
                    </footer>`;
            }
        }

        function renderMathJax() {
            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise().catch(err => console.error('MathJax error: ' + err.message));
            }
        }

        let allTalks = [];

        // Generate Google Calendar URL (uses IST-anchored Date)
        function generateGoogleCalendarURL(talk) {
            const startDate = parseISTDateTime(talk.date, talk.time);
            const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);

            const fmt = d => d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}Z$/, 'Z');
            const title = encodeURIComponent(`${talk.title} - ${talk.series}`);
            const details = encodeURIComponent(
                `Speaker: ${talk.speaker || 'TBA'}\n\n${talk.abstract || ''}\n\nZoom: ${talk.zoomLink || 'TBA'}\nID: ${talk.meetingId || 'TBA'}\nPasscode: ${talk.passcode || 'TBA'}`
            );
            const location = encodeURIComponent(talk.zoomLink ? `Zoom - ${talk.zoomLink}` : 'Online');
            return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(startDate)}/${fmt(endDate)}&details=${details}&location=${location}`;
        }

        function generateICS(talk) {
            const startDate = parseISTDateTime(talk.date, talk.time);
            const endDate = new Date(startDate.getTime() + 60 * 60 * 1000);

            const fmt = d => {
                const pad = n => String(n).padStart(2, '0');
                // Format in IST for the TZID block
                const ist = new Date(d.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
                return `${ist.getFullYear()}${pad(ist.getMonth() + 1)}${pad(ist.getDate())}T${pad(ist.getHours())}${pad(ist.getMinutes())}00`;
            };

            const esc = t => (t || '').replace(/[\\,;]/g, '\\$&').replace(/\n/g, '\\n');

            const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
PRODID:-//Topology and Geometry Seminar//IIIT Delhi//EN
CALSCALE:GREGORIAN
METHOD:PUBLISH
BEGIN:VTIMEZONE
TZID:Asia/Kolkata
BEGIN:STANDARD
DTSTART:20070101T000000
TZNAME:IST
TZOFFSETFROM:+0530
TZOFFSETTO:+0530
END:STANDARD
END:VTIMEZONE
BEGIN:VEVENT
UID:${talk.id || Date.now()}@topologygeometryseminar.iiitd.ac.in
DTSTART;TZID=Asia/Kolkata:${fmt(startDate)}
DTEND;TZID=Asia/Kolkata:${fmt(endDate)}
SUMMARY:${esc(talk.title)} - ${esc(talk.series)}
DESCRIPTION:Speaker: ${esc(talk.speaker || 'TBA')}\\n\\n${esc(talk.abstract || '')}\\n\\nZoom: ${esc(talk.zoomLink || 'TBA')}\\nID: ${esc(talk.meetingId || 'TBA')}\\nPasscode: ${esc(talk.passcode || 'TBA')}
LOCATION:${esc(talk.zoomLink ? `Zoom - ${talk.zoomLink}` : 'Online')}
STATUS:CONFIRMED
END:VEVENT
END:VCALENDAR`;

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${talk.title.replace(/[^a-zA-Z0-9\s]/g, '').replace(/\s+/g, '_')}.ics`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showCalendarOptions(talk, buttonElement) {
            document.querySelector('.calendar-dropdown')?.remove();

            const dropdown = document.createElement('div');
            dropdown.className = 'calendar-dropdown absolute bg-white border border-gray-200 rounded-lg shadow-lg z-50 mt-2 min-w-48';
            dropdown.innerHTML = `
                <button class="google-btn w-full text-left px-4 py-2 hover:bg-gray-100 flex items-center transition-colors border-b border-gray-100">
                    <i class="fab fa-google text-red-500 mr-3"></i>Google Calendar
                </button>
                <button class="ics-btn w-full text-left px-4 py-2 hover:bg-gray-100 flex items-center transition-colors">
                    <i class="fas fa-calendar-alt text-blue-500 mr-3"></i>Apple Calendar / Outlook
                </button>`;

            const container = buttonElement.closest('.bg-white');
            if (container) {
                container.style.position = 'relative';
                container.appendChild(dropdown);
                dropdown.style.cssText = `position:absolute;top:${buttonElement.offsetTop + buttonElement.offsetHeight + 5}px;right:20px`;
            } else {
                document.body.appendChild(dropdown);
                const rect = buttonElement.getBoundingClientRect();
                dropdown.style.cssText = `position:fixed;top:${rect.bottom + 5}px;left:${rect.left}px`;
            }

            dropdown.querySelector('.google-btn').addEventListener('click', e => {
                e.stopPropagation();
                window.open(generateGoogleCalendarURL(talk), '_blank');
                dropdown.remove();
            });
            dropdown.querySelector('.ics-btn').addEventListener('click', e => {
                e.stopPropagation();
                generateICS(talk);
                dropdown.remove();
            });

            setTimeout(() => {
                const close = e => { if (!dropdown.contains(e.target) && e.target !== buttonElement) { dropdown.remove(); document.removeEventListener('click', close); } };
                document.addEventListener('click', close);
            }, 100);
        }

        async function fetchAndRenderSchedule() {
            try {
                const response = await fetch('/data/talks.json');
                allTalks = await response.json();

                const currentDate = new Date();
                const upcomingTalks = allTalks
                    .filter(talk => parseISTDateTime(talk.date, talk.time) >= currentDate)
                    .sort((a, b) => parseISTDateTime(a.date, a.time) - parseISTDateTime(b.date, b.time));

                // Group by series
                const groupedTalks = {};
                upcomingTalks.forEach(talk => {
                    const s = talk.series || 'Others';
                    (groupedTalks[s] = groupedTalks[s] || []).push(talk);
                });

                let accordionHTML = '';
                for (const [series, talks] of Object.entries(groupedTalks)) {
                    if (!talks.length) continue;
                    const seriesId = series.toLowerCase().replace(/[^a-z0-9]/g, '-');
                    accordionHTML += `
                        <div class="border border-gray-200 rounded-lg">
                            <button class="accordion-btn w-full text-left p-4 bg-blue-100 text-blue-800 font-semibold flex justify-between items-center hover:bg-blue-200 focus:outline-none transition-colors" data-target="${seriesId}-talks">
                                ${series} (${talks.length} talk${talks.length > 1 ? 's' : ''})
                                <i class="fas fa-chevron-down transition-transform"></i>
                            </button>
                            <div class="accordion-content space-y-8 p-4 hidden" id="${seriesId}-talks">
                                ${talks.map(talk => `
                                    <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-blue-500">
                                        <div class="flex flex-col md:flex-row justify-between gap-4">
                                            <div class="max-w-full md:max-w-[65%]">
                                                <h3 class="text-xl font-bold text-blue-700">${talk.title}</h3>
                                                <p class="text-gray-600 mb-2">${talk.speaker ? `Speaker: ${talk.personalPage ? `<a href="${talk.personalPage}" target="_blank" class="text-blue-600 hover:underline">${talk.speaker}</a>` : talk.speaker}` : ''}</p>
                                                <p class="text-gray-600 mb-2">${talk.series}${talk.part ? ` - ${talk.part}` : ''}</p>
                                                <p class="text-gray-700 mb-2 flex items-center">
                                                    <i class="far fa-calendar-alt mr-2"></i>
                                                    ${formatTalkDate(talk.date, talk.time)}
                                                </p>
                                                <p class="text-gray-700 mb-4 flex items-center">
                                                    <i class="far fa-clock mr-2"></i>
                                                    ${formatTalkTime(talk.date, talk.time)}
                                                </p>
                                                ${talk.abstract ? `<p class="text-gray-700 mb-4 text-justify"><strong>Abstract:</strong> ${talk.abstract}</p>` : ''}
                                                ${talk.seriesLink && talk.seriesLink !== '#' ? `<a href="${talk.seriesLink}" class="text-blue-600 hover:underline">View Series Details</a>` : ''}
                                            </div>
                                            <div class="w-full md:w-1/3">
                                                <div class="bg-blue-50 p-4 rounded-lg">
                                                    <h4 class="font-bold mb-2 text-blue-800">Zoom Meeting</h4>
                                                    <p class="mb-2"><span class="font-medium text-gray-700">Link:</span> ${talk.zoomLink?.trim() ? `<a href="${talk.zoomLink}" class="text-blue-600 hover:underline" target="_blank">Join Meeting</a>` : 'TBA'}</p>
                                                    <p class="mb-2"><span class="font-medium text-gray-700">Meeting ID:</span> ${talk.meetingId?.trim() || 'TBA'}</p>
                                                    <p><span class="font-medium text-gray-700">Passcode:</span> ${talk.passcode?.trim() || 'TBA'}</p>
                                                </div>
                                                <button class="calendar-btn mt-3 w-full bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 focus:outline-none transition-colors flex items-center justify-center" data-talk-id="${talk.id}">
                                                    <i class="fas fa-calendar-plus mr-2"></i>Add to Calendar
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                }

                const container = document.getElementById('schedule-talks');
                if (accordionHTML) {
                    container.innerHTML = accordionHTML;

                    document.querySelectorAll('.accordion-btn').forEach(btn => {
                        btn.addEventListener('click', function () {
                            const content = document.getElementById(this.dataset.target);
                            const icon = this.querySelector('i');
                            content.classList.toggle('hidden');
                            icon.classList.toggle('fa-chevron-down');
                            icon.classList.toggle('fa-chevron-up');
                        });
                    });

                    document.querySelectorAll('.calendar-btn').forEach(btn => {
                        btn.addEventListener('click', function (e) {
                            e.stopPropagation();
                            const talk = allTalks.find(t => t.id == this.dataset.talkId);
                            if (talk) showCalendarOptions(talk, this);
                        });
                    });
                } else {
                    container.innerHTML = '<p class="text-gray-600 text-center py-8">No upcoming talks scheduled at this time.</p>';
                }

                renderMathJax();
            } catch (error) {
                console.error('Error fetching talks:', error);
                document.getElementById('schedule-talks').innerHTML = `
                    <div class="text-center py-8">
                        <i class="fas fa-exclamation-triangle text-red-500 text-2xl mb-2"></i>
                        <p class="text-red-600">Error loading talks. Please try again later.</p>
                        <p class="text-gray-500 text-sm mt-2">${error.message}</p>
                    </div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadNavbar();
            await loadFooter();
            await fetchAndRenderSchedule();
        });
    </script>

    <!-- MathJax -->
    <script>
        window.MathJax = {
            loader: { load: ['[tex]/mathtools'] },
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                tags: 'ams',
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                packages: { '[+]': ['mathtools'] }
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</body>
</html>
